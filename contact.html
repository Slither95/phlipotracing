<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Phlipot Racing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- NAV -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-2xl font-black">P</div>
        <h1 class="text-2xl font-black tracking-tighter">PHLIPOT RACING</h1>
      </div>
      <div class="hidden md:flex gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-red-500">Home</a>
        <a href="about.html" class="hover:text-red-500">About</a>
        <a href="schedule.html" class="hover:text-red-500">Schedule</a>
        <a href="sponsors.html" class="hover:text-red-500">Sponsors</a>
        <a href="gallery.html" class="hover:text-red-500">Gallery</a>
        <a href="news.html" class="hover:text-red-500">News</a>
        <a href="contact.html" class="text-red-500 font-semibold">Contact</a>
      </div>
      <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div class="pt-24 max-w-2xl mx-auto px-6 text-center">
    <h1 class="text-5xl font-black mb-8">Get In Touch</h1>
    <p class="text-zinc-400 mb-12">Questions? Sponsorship inquiries? Just want to say hello?</p>

    <!-- Success Message -->
    <div id="success-message" class="hidden bg-green-900 border border-green-600 text-green-300 p-8 rounded-3xl mb-8">
      <i class="fas fa-check-circle text-5xl mb-4"></i>
      <h3 class="text-2xl font-semibold">Message Sent!</h3>
      <p class="mt-3">Thank you! We'll get back to you as soon as possible.</p>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="hidden bg-red-900 border border-red-600 text-red-300 p-8 rounded-3xl mb-8"></div>

    <form id="contact-form" action="https://formspree.io/f/mnjlkdrg" method="POST" class="space-y-6">
      <input type="text" name="name" placeholder="Your Name" required class="w-full px-6 py-5 bg-zinc-900 border border-zinc-700 rounded-3xl focus:border-red-600 outline-none">
      <input type="email" name="email" placeholder="Your Email" required class="w-full px-6 py-5 bg-zinc-900 border border-zinc-700 rounded-3xl focus:border-red-600 outline-none">
      <input type="text" name="_subject" placeholder="Subject (optional)" class="w-full px-6 py-5 bg-zinc-900 border border-zinc-700 rounded-3xl focus:border-red-600 outline-none">
      <textarea name="message" rows="6" placeholder="Your Message" required class="w-full px-6 py-5 bg-zinc-900 border border-zinc-700 rounded-3xl focus:border-red-600 outline-none"></textarea>
      
      <button type="submit" id="submit-btn" class="w-full py-6 bg-red-600 hover:bg-red-700 rounded-3xl text-xl font-semibold transition">
        Send Message
      </button>
    </form>

    <!-- Social Links (Instagram removed) -->
    <div class="flex justify-center gap-12 text-5xl mt-16">
      <a href="https://www.facebook.com/weaselphlipotgarkeracing" target="_blank" rel="noopener noreferrer" class="hover:text-red-500 transition">
        <i class="fab fa-facebook"></i>
      </a>
      <a href="https://x.com/weaselphlipot52" target="_blank" rel="noopener noreferrer" class="hover:text-red-500 transition">
        <i class="fab fa-x-twitter"></i>
      </a>
    </div>
  </div>

  <script>
    const form = document.getElementById('contact-form');
    const successMsg = document.getElementById('success-message');
    const errorMsg = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.innerHTML = 'Sending...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          successMsg.classList.remove('hidden');
          form.classList.add('hidden');
          form.reset();
        } else {
          throw new Error('Submission failed');
        }
      } catch (err) {
        errorMsg.textContent = "Something went wrong. Please try again or email us directly.";
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.innerHTML = 'Send Message';
        submitBtn.disabled = false;
      }
    });

    function toggleMobileMenu() {
      alert("Mobile menu coming soon");
    }
  </script>
</body>
</html>
