<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsors | Phlipot Racing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .sponsor-card {
      transition: all 0.3s ease;
    }
    .sponsor-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgb(239 68 68 / 0.2);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- NAV -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-2xl font-black">P</div>
        <h1 class="text-2xl font-black tracking-tighter">PHLIPOT RACING</h1>
      </div>
      <div class="hidden md:flex gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-red-500">Home</a>
        <a href="about.html" class="hover:text-red-500">About</a>
        <a href="schedule.html" class="hover:text-red-500">Schedule</a>
        <a href="sponsors.html" class="text-red-500 font-semibold">Sponsors</a>
        <a href="gallery.html" class="hover:text-red-500">Gallery</a>
        <a href="news.html" class="hover:text-red-500">News</a>
        <a href="contact.html" class="hover:text-red-500">Contact</a>
      </div>
      <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div class="pt-24 pb-12 max-w-7xl mx-auto px-6">
    <h1 class="text-5xl font-black text-center mb-4">Our Sponsors</h1>
    <p class="text-center text-zinc-400 mb-12 text-lg">Thank you to all our partners who help keep us racing!</p>

    <div id="sponsors-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
      <!-- Populated automatically by JavaScript -->
    </div>
  </div>

  <script>
    const repoOwner = "Slither95";
    const repoName = "phlipotracing";
    const sponsorsFolder = "images/sponsors";

    async function loadSponsors() {
      const container = document.getElementById('sponsors-container');
      container.innerHTML = '<p class="col-span-full text-center text-zinc-400 py-12">Loading sponsors...</p>';

      try {
        const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${sponsorsFolder}`);
        
        if (!response.ok) throw new Error('Failed to load');

        const files = await response.json();

        const imageFiles = files.filter(file => 
          file.type === "file" && /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(file.name)
        );

        container.innerHTML = '';

        if (imageFiles.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center text-amber-400 py-12">No sponsor logos found yet.<br>Upload them to images/sponsors/</p>`;
          return;
        }

        imageFiles.forEach(file => {
          // Clean filename to make nice display name
          const displayName = file.name
            .replace(/\.(jpg|jpeg|png|gif|webp|svg)$/i, '')
            .replace(/-/g, ' ')
            .replace(/_/g, ' ');

          const div = document.createElement('div');
          div.className = 'sponsor-card bg-zinc-900 p-8 rounded-3xl text-center';
          div.innerHTML = `
            <img src="${file.download_url}" 
                 alt="${displayName}" 
                 class="w-full h-32 object-contain mx-auto mb-6">
            <p class="text-lg font-semibold text-white">${displayName}</p>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="col-span-full text-center py-12 text-red-400">
            Error loading sponsors<br>
            <span class="text-sm text-zinc-500">Make sure images/sponsors/ exists and repo is public</span>
          </div>`;
      }
    }

    // Load sponsors when page loads
    window.onload = loadSponsors;

    function toggleMobileMenu() {
      alert("Mobile menu coming soon");
    }
  </script>
</body>
</html>
