<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Phlipot Racing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .thumbnail { transition: all 0.3s ease; }
    .thumbnail:hover { transform: scale(1.08); box-shadow: 0 10px 15px -3px rgb(239 68 68); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
  </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- NAV -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-2xl font-black">P</div>
        <h1 class="text-2xl font-black tracking-tighter">PHLIPOT RACING</h1>
      </div>
      <div class="hidden md:flex gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-red-500">Home</a>
        <a href="about.html" class="hover:text-red-500">About</a>
        <a href="schedule.html" class="hover:text-red-500">Schedule</a>
        <a href="sponsors.html" class="hover:text-red-500">Sponsors</a>
        <a href="gallery.html" class="text-red-500 font-semibold">Gallery</a>
        <a href="news.html" class="hover:text-red-500">News</a>
        <a href="contact.html" class="hover:text-red-500">Contact</a>
      </div>
      <button onclick="toggleMobileMenu()" class="md:hidden text-3xl"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div class="pt-20 pb-12 max-w-7xl mx-auto px-6">
    <h1 class="text-5xl font-black text-center mb-12">Photo Gallery</h1>

    <!-- Tabs -->
    <div class="flex flex-wrap justify-center gap-6 md:gap-8 mb-12 border-b border-zinc-700 pb-2">
      <button onclick="loadGallery(0)" id="tab0" class="tab-button text-xl font-semibold px-6 py-3 border-b-4 border-red-600 text-red-500">Current</button>
      <button onclick="loadGallery(1)" id="tab1" class="tab-button text-xl font-semibold px-6 py-3 text-zinc-400 hover:text-white">Past Phlipot Pics</button>
      <button onclick="loadGallery(2)" id="tab2" class="tab-button text-xl font-semibold px-6 py-3 text-zinc-400 hover:text-white">Vintage Racing Pics</button>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center" onclick="if(event.target===this)closeLightbox()">
    <div class="relative max-w-5xl mx-4">
      <button onclick="closeLightbox()" class="absolute -top-5 -right-5 bg-black text-white w-12 h-12 rounded-full text-4xl hover:bg-red-600">×</button>
      <img id="lightbox-img" src="" class="max-h-[85vh] rounded-3xl shadow-2xl" alt="">
      <div class="flex justify-between mt-6 text-5xl">
        <button onclick="prevImage()" class="bg-black/70 hover:bg-red-600 px-6 py-4 rounded-2xl">‹</button>
        <button onclick="nextImage()" class="bg-black/70 hover:bg-red-600 px-6 py-4 rounded-2xl">›</button>
      </div>
    </div>
  </div>

  <script>
    const repoOwner = "Slither95";
    const repoName = "phlipotracing";
    const folders = [
      "images/current",        // Tab 0
      "images/past-phlipot",   // Tab 1
      "images/vintage"         // Tab 2
    ];

    let currentImages = [];
    let currentIndex = 0;

    async function loadGallery(tab) {
      const container = document.getElementById('gallery-container');
      container.innerHTML = '<p class="text-center col-span-full text-zinc-400 py-12">Loading images...</p>';

      // Update active tab
      document.querySelectorAll('.tab-button').forEach((el, i) => {
        if (i === tab) el.classList.add('border-red-600', 'text-red-500');
        else el.classList.remove('border-red-600', 'text-red-500');
      });

      const folderPath = folders[tab];

      try {
        const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const files = await response.json();

        const imageFiles = files.filter(file => 
          file.type === "file" && /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)
        );

        currentImages = imageFiles.map(file => ({
          url: file.download_url,
          name: file.name
        }));

        container.innerHTML = '';

        if (currentImages.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center text-amber-400 py-12">No images found in this folder yet.</p>`;
          return;
        }

        currentImages.forEach((img, index) => {
          const div = document.createElement('div');
          div.className = 'cursor-pointer overflow-hidden rounded-3xl';
          div.innerHTML = `
            <img src="${img.url}" alt="${img.name}" 
                 class="thumbnail w-full aspect-square object-cover">
          `;
          div.onclick = () => openLightbox(index);
          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="col-span-full text-center py-12">
            <p class="text-red-400">Error loading ${folderPath}</p>
            <p class="text-sm text-zinc-500 mt-2">Make sure the folder exists and repo is public</p>
          </div>`;
      }
    }

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox').classList.remove('hidden');
      document.getElementById('lightbox-img').src = currentImages[currentIndex].url;
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden');
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
      document.getElementById('lightbox-img').src = currentImages[currentIndex].url;
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % currentImages.length;
      document.getElementById('lightbox-img').src = currentImages[currentIndex].url;
    }

    // Load "Current" tab by default
    window.onload = () => loadGallery(0);
  </script>
</body>
</html>
